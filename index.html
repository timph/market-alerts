# Minimalist SOXX Watchdog

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOXX Watchdog | Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #f8fafc;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .dashboard-card {

            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.6);
        }

        .proxy-badge {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-3xl w-full">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-2xl font-black tracking-tight uppercase">SOXX Watchdog</h1>
                <div id="activeProxy" class="proxy-badge flex items-center gap-2 px-3 py-1 bg-slate-800 border border-slate-700 rounded-full w-fit mx-auto md:mx-0 mt-2">
                    <span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span>

                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Connecting...</span>
                </div>
            </div>
            <button id="enableNotifs" class="text-[10px] font-bold bg-white text-black px-6 py-2.5 rounded-full hover:bg-slate-200 transition-all shadow-lg">
                ENABLE SYSTEM ALERTS
            </button>
        </header>

        <!-- Main ETF Gauge -->
        <div class="dashboard-card p-12 md:p-20 rounded-[50px] text-center relative overflow-hidden">
            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Semiconductor ETF (SOXX)</p>
            <div class="flex flex-col items-center">
                <h2 id="priceDisplay" class="text-7xl md:text-8xl font-black mono tracking-tighter mb-2">$562.14</h2>
                <span id="changeDisplay" class="text-3xl font-extrabold text-red-400">-3.98%</span>
            </div>
            <div class="mt-8 pt-8 border-t border-white/5">
                <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest">Tracking Signal: -3.00% Systemic Threshold</p>
            </div>
        </div>


        <p class="text-center mt-8 text-[10px] text-slate-700 mono">Heartbeat: Every 5 Minutes</p>
    </div>

    <!-- Alert Modal -->
    <div id="systemicAlert" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-50 flex items-center justify-center hidden p-6">
        <div class="dashboard-card max-w-sm w-full p-12 rounded-[50px] text-center border border-red-500/40">
            <div class="text-6xl mb-6">🚨</div>
            <h2 class="text-3xl font-black mb-4 uppercase tracking-tighter">Systemic Drop</h2>
            <p class="text-slate-400 text-sm mb-10 leading-relaxed">Alert: The semiconductor sector has breached the -3.00% drop threshold.</p>
            <button onclick="document.getElementById('systemicAlert').classList.add('hidden')" class="w-full py-4 bg-red-600 rounded-3xl font-black uppercase tracking-widest hover:bg-red-500 transition-colors">Acknowledge</button>
        </div>
    </div>

<script>
        // FIX 1: Added correct proxy paths
        const PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://corsproxy.io/?'
        ];

        // Market Baseline (June 9, 2026 Open)
        const OPEN_PRICE = 585.45; 
        let currentProxyIndex = 0;

        async function fetchMarketData() {
            // FIX 2: Correct Yahoo Finance endpoint and string interpolation
            const baseUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=SOXX`;
            
            for (let i = 0; i < PROXIES.length; i++) {
                const proxy = PROXIES[currentProxyIndex];
                const fullUrl = proxy + encodeURIComponent(baseUrl);
                
                updateBadge(`Node: ${new URL(proxy).hostname}...`, 'amber');

                try {
                    const response = await fetch(fullUrl);
                    if (!response.ok) throw new Error();
                    
                    const data = await response.json();
                    
                    if (data?.quoteResponse?.result?.[0]) {
                        updateBadge(`Live: ${new URL(proxy).hostname}`, 'emerald');
                        renderData(data.quoteResponse.result[0]);
                        return;
                    }
                } catch (err) {
                    currentProxyIndex = (currentProxyIndex + 1) % PROXIES.length;
                }
            }
            updateBadge("Signal Lost", "red");
        }

        function renderData(quote) {
            const price = quote.regularMarketPrice;
            const change = ((price - OPEN_PRICE) / OPEN_PRICE) * 100;

            document.getElementById('priceDisplay').innerText = `$${price.toFixed(2)}`;

            document.getElementById('changeDisplay').innerText = `${change.toFixed(2)}%`;
            document.getElementById('changeDisplay').className = `text-3xl font-extrabold ${change < 0 ? 'text-red-400' : 'text-emerald-400'}`;
            
            if (change < -3.0) {
                document.getElementById('systemicAlert').classList.remove('hidden');
                if (Notification.permission === 'granted') {
                    new Notification('Watchdog Alert', { body: `Systemic Drop: SOXX down ${change.toFixed(2)}%` });
                }
            }
        }

        function updateBadge(text, color) {
            const badge = document.getElementById('activeProxy');
            const dot = badge.querySelector('span:first-child');
            const label = badge.querySelector('span:last-child');
            label.innerText = text;
            
            // FIX 3: Explicit mappings for Tailwind CDN to pick up the classes
            const dotColorMap = {
                emerald: 'bg-emerald-500',
                red: 'bg-red-500',
                amber: 'bg-amber-500 animate-pulse'
            };
            
            const badgeColorMap = {
                emerald: 'bg-emerald-500/10 border-emerald-500/20',
                red: 'bg-red-500/10 border-red-500/20',
                amber: 'bg-amber-500/10 border-amber-500/20'
            };
            
            dot.className = `w-1.5 h-1.5 rounded-full ${dotColorMap[color]}`;
            badge.className = `proxy-badge flex items-center gap-2 px-3 py-1 border rounded-full w-fit ${badgeColorMap[color]}`;
        }

        document.getElementById('enableNotifs').addEventListener('click', () => {
            // Safety check in case browser doesn't support notifications
            if ("Notification" in window) {
                Notification.requestPermission();
            }
        });
        
        window.onload = () => {
            fetchMarketData();
            setInterval(fetchMarketData, 300000); // 5 Min
        };
    </script>
    
</body>
</html>
